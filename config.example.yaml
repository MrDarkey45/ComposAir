# ComposAir configuration.
# Copy this file to config.yaml and edit as needed.
# config.yaml is gitignored - your local edits stay local.

# --- Audio / synth ---
soundfont: soundfonts/GeneralUser-GS.sf2
instrument: 0          # General MIDI program number (0 = Acoustic Grand Piano)
audio_driver: dsound   # Windows: dsound (default), wasapi (lower latency)
sample_rate: 44100

# --- Camera ---
camera_index: 0        # 0 = first camera; try 1, 2, ... if you have multiple
camera_width: 1280
camera_height: 720
camera_fps: 30

# --- Gesture detection ---
# Normalized thumb-fingertip distance, where 1.0 = wrist-to-middle-MCP length.
# Calibrated against natural finger-touch gesture: touching produces d ~= 0.10 to 0.20.
# Lower pinch_threshold = need to bring fingers closer to trigger (harder).
# pinch_release should be 30-50% higher than pinch_threshold so the note does
# not flicker when you hold a near-pinch.
pinch_threshold: 0.18  # trigger note ON when d falls below this
pinch_release: 0.23    # trigger note OFF when d rises above this

# --- Musical state (Phase 3) ---
# Key letter and scale name. Supported keys: C, C#, D, D#, E, F, F#, G,
# G#, A, A#, B. Supported scales: major, natural_minor, harmonic_minor,
# dorian, major_pentatonic, minor_pentatonic.
key: C
scale: major

# --- Scale-degree assignments per finger (Phase 3) ---
# Each finger plays a scale degree (1 = root, 3 = third, 5 = fifth, etc.).
# Defaults to 1-3-5-7 (chord tones) so anything you play sounds harmonic.
# Phase 2's raw MIDI note mapping is replaced by this; the actual note is
# resolved from key + scale + degree + octave at pinch time.
finger_degrees:
  index: 1   # root
  middle: 3  # third
  ring: 5    # fifth
  pinky: 7   # seventh

# --- Second-hand modulation (Phase 6) ---
# When both hands are visible, one plays notes and the other modulates
# a continuous controller (default CC74 = filter cutoff). Raising the
# non-playing hand opens the filter (brighter); lowering closes it.
#
# playing_hand:
#   auto  - use MediaPipe handedness detection (recommended)
#   right - your right hand always plays, other hand modulates
#   left  - your left hand always plays, other hand modulates
# dominant_hand: used as fallback when auto detection is ambiguous,
#   and also when only one hand is visible (it is assumed to be this).
# cc_number: MIDI controller index.
#   7  - channel volume (recommended; works on any instrument)
#   11 - expression (like volume but for in-phrase swells)
#   1  - modulation wheel (vibrato on sustained instruments)
#   10 - pan (left/right stereo position; very obvious in headphones)
#   74 - filter cutoff (only audible on synth pads/leads)
# smoothing: 0 = no smoothing, ~0.5 = strong. Higher = less responsive
#   but less jittery.
# deadzone: minimum CC delta (0-127) to actually emit. Reduces MIDI
#   traffic from tiny hand movements.
# update_interval_ms: throttle CC sends to roughly this rate.
modulation:
  playing_hand: auto
  dominant_hand: right
  cc_number: 7
  smoothing: 0.4
  deadzone: 2
  update_interval_ms: 30

# --- Velocity from gesture speed (Phase 4) ---
# Maps how fast you close the pinch to MIDI velocity (loudness).
# A slow, gentle pinch plays softly; a fast, decisive pinch plays loudly.
#
# window_ms: how far back to look when measuring closing speed (typical 100-200 ms).
# fast_closure_rate: closure speed (in normalized-distance units per second)
#   that hits max_velocity. Anything faster clamps to max. Lower this if
#   you find it hard to play loud; raise it if every pinch is too loud.
# default: fallback velocity used in the first few frames after startup,
#   when there aren't enough samples to estimate slope.
velocity:
  min: 40
  max: 120
  default: 90
  window_ms: 150
  fast_closure_rate: 2.0

# --- Octave bands (Phase 3) ---
# The vertical screen is divided into N equal-height bands. Wrist Y
# position determines which band is active; higher hand = higher octave.
# base_octave is the octave assigned to the LOWEST band (bottom of screen).
# Standard piano middle C is in octave 4; base_octave=4 puts middle C at
# the bottom and the top band one or more octaves above.
# hysteresis is the extra Y distance the wrist must travel past a band
# boundary before the band switches; prevents flicker at the borders.
octave_bands:
  count: 3
  base_octave: 4
  hysteresis: 0.03
